<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>System D</title>
    </head>

    <body>
        <div id="menubutton" onclick="showMenu()">Menu</div>
        <div id='menu' hidden>
            <div>
              TIME<br><input type='range' id='simspeed' value='0.1' min='-1' max='1' step='0.05'>
            </div>
            <div>
              GRAVITY<br><input type='range' id='gstrength' value='10' min='0' max='20' step='1'>
            </div>
            <br>
            <div>
              BODY :<br>
              <br>
              <form id='form' onsubmit='return false;'>
                  Name<br><input type='text' id='bodyName'/><br>
                  Color<br><input placeholder="color hex ex: #ffa500" type='text' id='bodyColor'/><br>
                  Size<br><input type='text' id='bodySize'/><br>
                  Mass<br><input type='text' id='bodyMass'/><br>
                  Position X<br><input placeholder="from top left" type='text' id='bodyPosX'/><br>
                  Position Y<br><input placeholder="from top left" type='text' id='bodyPosY'/><br>
                  Velocity X<br><input type='text' id='bodyVelX'/><br>
                  Velocity Y<br><input type='text' id='bodyVelY'/><br>
                  <input value='New Body' type='submit' onclick='newBody();'/>
                  <input value='Modify' type='submit' onclick='modifyBody();'/>
              </form>
            </div>
            <br>
            <input type='text' placeholder="save/load code" id='saveCode'/>
            <br>
            <input value='New' type='submit' onclick='newSystem()'/>
            <input value='Save' type='submit' onclick='saveSystem();'/>
            <input value='Load' type='submit' onclick='loadSystem();'/>
            <br><br>
            <input value='HELP' type='submit' onclick='help();'/>
        </div>

        <div id="commands">
            <button onclick="startStop(this)">start / stop</button><br>
            <button onclick="move('l')"><</button>
            <button onclick="move('r')">></button>
            <button onclick="move('u')">^</button>
            <button onclick="move('d')">v</button><br>
            <button onclick="move('i')">+</button>
            <button onclick="move('o')">-</button>
        </div>
        
        <div>
            <canvas id='screen' width=250 height=250></canvas>
        </div>
    </body>
    <script src="main.js"></script>
</html>
